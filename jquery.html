<style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }

        #box {
            width: 200px;
            height: 100px;
            background: steelblue;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>jQuery Features Demo</h1>

    <!-- Append List Items -->
    <h2>Append List Items (With Counter)</h2>
    <button id="addItem">Add Item</button>
    <ul id="list"></ul>

    <!-- Dark Mode Toggle -->
    <h2>Dark Mode Toggle</h2>
    <button id="toggleDark">Toggle Dark Mode</button>

    <!-- Slide Animation -->
    <h2>Slide Animation</h2>
    <button id="slideBtn">Slide Toggle Box</button>
    <div id="box"></div>

    <script>
        $(document).ready(function () {

            // Counter for list items
            let count = 0;

            // Append List Items
            $("#addItem").click(function () {
                count++;
                $("#list").append("<li>Item " + count + "</li>");
            });

            // Dark Mode Toggle
            $("#toggleDark").click(function () {
                $("body").toggleClass("dark-mode");
            });

            // Slide Animation
            $("#slideBtn").click(function () {
                $("#box").slideToggle();
            });

        });
    </script>

</body>
